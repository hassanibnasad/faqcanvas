<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }

        :root {
            --widget-ink: #0f172a;
            --widget-cyan: #22d3ee;
            --widget-mist: #ecfeff;
            --widget-soft: #f8fafc;
        }

        .widget-bg {
            background:
                radial-gradient(circle at top right, rgba(34, 211, 238, 0.16), transparent 32%),
                linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        }

        .widget-chat {
            background:
                linear-gradient(180deg, rgba(240, 249, 255, 0.95), rgba(248, 250, 252, 0.98));
        }

        .widget-message {
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .widget-fade-in {
            animation: widget-fade-in 200ms ease-out;
        }

        @keyframes widget-fade-in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="widget-bg h-full overflow-hidden text-slate-900">
    <div class="flex h-full min-h-0 flex-col">
        <div class="border-b border-white/10 bg-slate-950 px-5 py-4 text-white">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs uppercase tracking-[0.3em] text-cyan-300">FAQCanvas</p>
                    <h1 id="widget-title" class="mt-2 text-lg font-bold">Support Widget</h1>
                </div>
                <div class="rounded-full bg-cyan-400/15 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.2em] text-cyan-200">
                    Live
                </div>
            </div>
            <p class="mt-3 text-sm text-slate-300">Ask a question and we will search this site's saved FAQs for the closest answer.</p>
        </div>

        <div id="widget-suggestions-panel" class="hidden border-b border-slate-200/80 bg-white/90 px-4 py-3 backdrop-blur">
            <div id="widget-suggestions" class="flex flex-wrap gap-2">
            </div>
        </div>

        <div id="chat-box" class="widget-chat flex min-h-0 flex-1 flex-col gap-3 overflow-y-auto px-4 py-4">
            <div id="widget-welcome-message" class="widget-message widget-fade-in max-w-[88%] rounded-[1.25rem] rounded-tl-md border border-slate-200/80 bg-white px-4 py-3 text-sm leading-6 text-slate-700 shadow-sm">
                Hi! Ask a question and I'll look for the best saved answer.
            </div>
        </div>

        <form id="widget-form" class="border-t border-slate-200 bg-white p-3.5">
            <div class="flex gap-3">
                <input
                    id="widget-question"
                    class="flex-1 rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none transition focus:border-cyan-400"
                    placeholder="Type your question..."
                    autocomplete="off"
                    required
                >
                <button class="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-slate-900/10">Send</button>
            </div>
        </form>
    </div>

    <script>
        window.widgetConfig = {
            siteKey: new URLSearchParams(window.location.search).get("site_key") || ""
        };
    </script>
    <script src="/static/js/widget.js"></script>
</body>
</html>
